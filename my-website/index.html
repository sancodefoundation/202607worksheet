<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的網頁分享主頁</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f9f9f9; }
        .grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 30px; }
        .icon-link { text-decoration: none; color: #333; display: flex; flex-direction: column; align-items: center; }
        .icon { width: 80px; height: 80px; background-color: #e0e0e0; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 10px; transition: transform 0.2s; }
        .icon:hover { transform: scale(1.1); background-color: #d0d0d0; }
    </style>
</head>
<body>

    <h1>我的 HTML 檔案作品集</h1>
    <p>點擊下方的圖示觀看各個分頁內容</p>

    <div class="grid">
        <!-- 這是示範檔案的連結 -->
        <a href="page0.html" class="icon-link">
            <div class="icon">📄</div>
            <span>示範檔網頁</span>
        </a>

        <!-- 未來有第 2 份、第 3 份時，就在下方複製貼上類似的區塊 -->
    </div>

</body>
</html>
